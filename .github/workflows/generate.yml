name: TaxAMC — Generate City Pages

# ════════════════════════════════════════════════════════════
#  WHEN DOES THIS RUN?
# ════════════════════════════════════════════════════════════
on:

  # 1. Automatically when you push changes to any of these files
  push:
    branches: [ main ]
    paths:
      - 'cities.json'
      - 'templates/**'
      - 'generate.py'

  # 2. Automatically on the 1st of every month at 9:00 AM IST
  #    Keeps sitemap dates fresh so Google recrawls regularly
  schedule:
    - cron: '30 3 1 * *'

  # 3. Manually from GitHub → Actions tab → "Run workflow" button
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to generate (comma-separated, e.g. gst,itr) — leave blank for all 24'
        required: false
        default: ''
      use_ai:
        description: 'AI intros for new pages only? (true/false)'
        required: false
        default: 'false'
      force_ai:
        description: 'Force AI intros on ALL pages including existing? (true/false)'
        required: false
        default: 'false'

# ════════════════════════════════════════════════════════════
#  GOOGLE SHEET SETUP
# ════════════════════════════════════════════════════════════
#
#  Your cities database lives in Google Sheets — 202 cities, 12 columns.
#
#  If you ever need to update the sheet URL:
#  Step 1 — Open your Google Sheet
#  Step 2 — File → Share → Publish to web
#           → Select your sheet tab → Select "Comma-separated values (.csv)"
#           → Click Publish → Copy the URL
#  Step 3 — GitHub repo → Settings → Secrets → Actions
#           → Update secret: SHEET_CSV_URL → paste new URL
#
#  Required columns (row 1 headers):
#    city | state | state_code | slug | commissionerate | zone |
#    local_areas | key_industries | intro_note | nearby_cities |
#    company_note | gst_note
#
#  For local_areas, key_industries, nearby_cities:
#    Separate multiple values with a pipe |
#    Example: Whitefield|Electronic City|Koramangala
#
# ════════════════════════════════════════════════════════════
#  AI INTROS SETUP (Google Gemini — Free)
# ════════════════════════════════════════════════════════════
#
#  1. Go to aistudio.google.com (use a fresh Google account)
#  2. Click "Get API key" → "Create API key" → copy the key
#  3. GitHub repo → Settings → Secrets → Actions
#     → Add secret: GEMINI_API_KEY → paste key
#  4. Run workflow with force_ai = true
#
#  Free limits: 1,500 requests/day, 15 req/min
#  With 202 cities: run 4 services/day safely (808 requests)
#  Full AI intros across all 24 services takes ~6 days
#  Run after 12:30 PM IST (Gemini quota resets at midnight US Pacific)
#
#  DAY-WISE SCHEDULE (after 12:30 PM IST each day):
#  Day 1:  gst,company,itr,trademark
#  Day 2:  msme,llp,partnership,roc
#  Day 3:  iec,gst-return,tds,gst-cancellation
#  Day 4:  gst-notice,business-loan,itr-freelancers,itr-doctors
#  Day 5:  ecommerce-gst,capital-gains,itr-creators,restaurant-gst
#  Day 6:  export-lut,gst-pharma,accounting-it,tds-contractors
#
# ════════════════════════════════════════════════════════════
#  BING WEBMASTER TOOLS SETUP (covers Yahoo + DuckDuckGo)
# ════════════════════════════════════════════════════════════
#
#  Step 1 — Go to: https://www.bing.com/webmasters
#  Step 2 — Sign in with a Microsoft account (free)
#  Step 3 — Add site → enter https://taxamc.com
#  Step 4 — Verify ownership (add the HTML meta tag to index.html)
#  Step 5 — Sitemaps → Submit → sitemap-cities.xml
#
#  OPTIONAL — Save Bing API key as GitHub Secret: BING_API_KEY
#
# ════════════════════════════════════════════════════════════

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Download your repository ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Install Python ─────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install required Python libraries ─────────────
      - name: Install dependencies
        run: pip install jinja2

      # ── 4. Run the generator ──────────────────────────────
      - name: Generate city pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          CMD="python generate.py"
          CMD="$CMD --output ."
          CMD="$CMD --cities cities.json"
          CMD="$CMD --templates templates"

          # Use specific services if provided, otherwise generate all 24
          SVCS="${{ github.event.inputs.services }}"
          if [ -n "$SVCS" ]; then
            CMD="$CMD --services \"$SVCS\""
          fi

          CMD="$CMD --ping"

          # Use Google Sheet if the secret is set (recommended — 202 cities)
          SHEET="${{ secrets.SHEET_CSV_URL }}"
          if [ -n "$SHEET" ]; then
            echo "📊 Google Sheet URL found — reading cities from sheet"
            CMD="$CMD --sheet \"$SHEET\""
          else
            echo "📄 No Google Sheet URL set — using cities.json"
          fi

          # AI intros — case-insensitive true/false handling
          FORCE_AI=$(echo "${{ github.event.inputs.force_ai }}" | tr '[:upper:]' '[:lower:]')
          USE_AI=$(echo "${{ github.event.inputs.use_ai }}" | tr '[:upper:]' '[:lower:]')

          if [ "$FORCE_AI" = "true" ]; then
            CMD="$CMD --force-ai"
          elif [ "$USE_AI" = "true" ]; then
            CMD="$CMD --ai"
          fi

          echo "Running: $CMD"
          eval $CMD

      # ── 5. Ping Bing with API key if available ────────────
      - name: Ping Bing Webmaster API (covers Yahoo + DuckDuckGo)
        run: |
          BING_KEY="${{ secrets.BING_API_KEY }}"
          if [ -n "$BING_KEY" ]; then
            echo "Submitting sitemap to Bing Webmaster API..."
            curl -s -X POST "https://ssl.bing.com/webmaster/api.svc/json/SubmitSitemap?apikey=${BING_KEY}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"siteUrl\":\"https://taxamc.com\",\"sitemap\":\"https://taxamc.com/sitemap-cities.xml\"}"
            echo ""
            echo "✓ Bing API submission done (covers Yahoo + DuckDuckGo)"
          else
            echo "No BING_API_KEY secret set — skipping API submission"
          fi

      # ── 6. Commit all generated files back to repo ────────
      - name: Commit and push generated pages
        run: |
          git config --local user.email "generator@taxamc.com"
          git config --local user.name "TaxAMC Generator Bot"

          git add article-*.html                       2>/dev/null || true
          git add sitemap-cities.xml                   2>/dev/null || true
          git add _generated_pages.csv                 2>/dev/null || true
          git add _ai_intros.json                      2>/dev/null || true

          if git diff --staged --quiet; then
            echo "✓ No changes detected — all pages already up to date."
          else
            HTML_COUNT=$(git diff --staged --name-only | grep -c "\.html$" || echo "0")
            git commit -m "🤖 Auto-generated ${HTML_COUNT} city pages [$(date '+%d %b %Y')]"
            git push
            echo "✅ Committed and pushed ${HTML_COUNT} updated pages."
          fi
